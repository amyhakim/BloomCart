services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:Z
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app:Z
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/db
      GEMINI_API_KEY: AQ.Ab8RN6K4bz0ZDdOKioKDlsPfnfi7oAo17sRqkfxtyywSCEVD8A
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-sim:
    image: python:3.12-slim
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/db
    volumes:
      - ./data_sim:/scripts:Z
    working_dir: /scripts
    command: >
      sh -c "pip install psycopg2-binary &&
             python simulator.py"
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
